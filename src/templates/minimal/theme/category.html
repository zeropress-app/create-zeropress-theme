<section class="site-container intro-section">
  <p class="eyebrow">Category</p>
  <h1>{{taxonomy.name}}</h1>
  <p class="intro-copy">Posts collected under this section of the site.</p>
</section>
<section class="site-container post-section">
  <div class="post-list">
    {{#for post in posts.items}}
      {{partial:post-list-item variant="taxonomy" show_excerpt=true}}
    {{/for}}
  </div>
  {{partial:pagination}}
</section>
