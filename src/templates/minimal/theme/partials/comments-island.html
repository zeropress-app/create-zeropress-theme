<section class="comments-block" data-comments-root data-comments-post="{{post.public_id}}">
  <header class="comments-header">
    <h2>Comments <span data-comments-count></span></h2>
  </header>
  <div class="comments-list" data-comments-list></div>
  <form class="comment-form" data-comment-form>
    <label>
      <span>Name</span>
      <input name="name" type="text" placeholder="Anonymous">
    </label>
    <label>
      <span>Comment</span>
      <textarea name="body" rows="4" required placeholder="Share your thoughts…"></textarea>
    </label>
    <button type="submit">Post comment →</button>
  </form>
</section>
