<article class="post-single docs-article">
  <header class="post-header">
    <p class="eyebrow">Update Note</p>
    <h1>{{post.title}}</h1>
    <div class="post-meta">
      <time datetime="{{post.published_at_iso}}">{{post.published_at}}</time>
      <span>{{post.reading_time}}</span>
      <span>{{post.author_name}}</span>
    </div>
  </header>

  <div class="post-content">
    {{post.html}}
  </div>

  <footer class="post-footer">
    <div class="post-categories">{{post.categories_html}}</div>
    <div class="post-tags">{{post.tags_html}}</div>
  </footer>

  <section class="post-comments">
    {{post.comments_html}}
  </section>
</article>
