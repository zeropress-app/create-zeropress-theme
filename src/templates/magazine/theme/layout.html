<!doctype html>
<html lang="{{site.locale}}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{meta.title}}</title>
    <meta name="theme-color" content="#f5f1ea">
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    {{partial:theme-init}}
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400&family=Inter:wght@300;400;500;600&display=swap">
    <link rel="stylesheet" href="/assets/style.css">
    {{meta.head_tags}}
  </head>
  <body class="theme-body">
    <a class="skip-link" href="#content">Skip to content</a>
    {{slot:header}}
    {{#if route.is_front_page}}{{partial:side-rail}}{{/if}}
    {{#if_eq route.type "post"}}<div class="reading-progress" data-reading-progress aria-hidden="true"><span></span></div>{{/if_eq}}
    <main id="content" class="site-main">
      {{slot:content}}
    </main>
    {{slot:footer}}
    {{partial:content-enhancements}}
  </body>
</html>
