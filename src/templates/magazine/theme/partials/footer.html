<footer class="masthead-footer">
  <div class="footer-shell">
    <div class="footer-meta">
      <div class="footer-brand">
        <p class="footer-title">{{site.title}}</p>
        <p class="footer-copy">{{site.description}}</p>
      </div>
      <nav class="footer-nav" aria-label="Footer">
        {{menu:footer}}
      </nav>
    </div>
    <div class="footer-fineprint smallcaps">
      {{#if site.footer.copyright_text}}<span>{{site.footer.copyright_text}}</span>{{#else_if site.title}}<span>{{site.title}}</span>{{/if}}
      {{#if site.footer.attribution.enabled}}<span>· Published with <a href="https://zeropress.app" target="_blank" rel="noreferrer noopener">ZeroPress</a></span>{{/if}}
    </div>
  </div>
</footer>
