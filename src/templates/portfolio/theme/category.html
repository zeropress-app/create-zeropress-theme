<section class="grid">
  <div class="grid__rail">{{partial:section-label number="—" title="Category"}}</div>
  <div class="grid__main">
    <h1 class="hero-title">{{taxonomy.name}}</h1>
    {{#if taxonomy.description}}<p class="hero-lede">{{taxonomy.description}}</p>{{/if}}

    {{#if posts.items}}
      <div class="note-list note-list--full">
        {{#for post in posts.items}}
          {{partial:post-list-item show_excerpt=true}}
        {{/for}}
      </div>
    {{/if}}

    {{partial:pagination}}
  </div>
</section>
