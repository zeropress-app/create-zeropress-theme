{{#if pagination.has_multiple_pages}}
  <nav class="pagination" aria-label="Pagination">
    {{#if pagination.has_prev}}<a class="mono" href="{{pagination.prev_url}}">← Previous</a>{{/if}}
    {{#for page in pagination.window}}
      {{#if_eq page.kind "page"}}<a class="mono page-link {{#if page.current}}is-current{{/if}}" href="{{page.url}}">{{page.number}}</a>
      {{#else_if_eq page.kind "gap"}}<span class="mono muted">…</span>{{/if_eq}}
    {{/for}}
    {{#if pagination.has_next}}<a class="mono" href="{{pagination.next_url}}">Next →</a>{{/if}}
  </nav>
{{/if}}
